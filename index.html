<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Inteligente - Leroy Merlin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="contenedor-principal">
        <header>
            <img src="logo.png" alt="Leroy Merlin" class="logo">
            <div class="info-tienda">
                <h1>Kiosco de Orientación - Rivas</h1>
                <p>Busca productos, servicios o zonas de la tienda</p>
            </div>
        </header>

        <div id="mapa-container">
            <svg id="mapa-svg" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
                
                <defs>
                    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
                    </filter>

                    <g id="coche-frente">
                        <rect x="-16" y="4" width="4" height="8" rx="1" fill="#333"/>
                        <rect x="12" y="4" width="4" height="8" rx="1" fill="#333"/>
                        <path d="M -14 8 C -14 0, -10 -12, -8 -14 L 8 -14 C 10 -12, 14 0, 14 8 C 14 12, -14 12, -14 8 Z" fill="#00304b"/>
                        <path d="M -9 -1 L -6 -11 L 6 -11 L 9 -1 Z" fill="#caced2"/>
                        <circle cx="-10" cy="5" r="2.5" fill="#FFF"/>
                        <circle cx="10" cy="5" r="2.5" fill="#FFF"/>
                        <rect x="-4" y="4" width="8" height="3" rx="1" fill="#222"/>
                    </g>

                    <g id="coche-espalda">
                        <rect x="-16" y="4" width="4" height="8" rx="1" fill="#333"/>
                        <rect x="12" y="4" width="4" height="8" rx="1" fill="#333"/>
                        <path d="M -14 8 C -14 0, -10 -12, -8 -14 L 8 -14 C 10 -12, 14 0, 14 8 C 14 12, -14 12, -14 8 Z" fill="#00304b"/>
                        <path d="M -9 -1 L -6 -11 L 6 -11 L 9 -1 Z" fill="#caced2"/>
                        <rect x="-13" y="3" width="5" height="3" rx="1" fill="#d32f2f"/>
                        <rect x="8" y="3" width="5" height="3" rx="1" fill="#d32f2f"/>
                        <rect x="-4" y="4" width="8" height="3" fill="#FFF"/>
                    </g>
                </defs>

                <rect width="1200" height="800" fill="#f4f7f1" />
                
                <g id="capa-obstaculos">
                    <rect x="50" y="150" width="220" height="250" class="bloque-verde" data-sec="Cerámica"/>
                    <rect x="300" y="150" width="150" height="250" class="bloque-verde" data-sec="Herramientas"/>
                    <rect x="500" y="150" width="450" height="250" class="bloque-verde" data-sec="Baños"/>
                    <rect x="50" y="450" width="300" height="200" class="bloque-verde" data-sec="Decoración"/>
                    <rect x="400" y="450" width="350" height="200" class="bloque-verde" data-sec="Jardín"/>
                    <rect x="800" y="450" width="350" height="200" class="bloque-verde" data-sec="Iluminación"/>

                    <polygon points="835,160 980,160 880,260 835,260" class="bloque-servicio" />

                    <rect x="1050" y="150" width="100" height="150" class="bloque-servicio" data-sec="Aseos"/>
                </g>

                <g class="textos-mapa">
                    <text x="160" y="275" font-size="20">Cerámica</text>
                    <text x="560" y="190" font-size="20">Baños</text>
                    <text x="1100" y="225" font-size="16" fill="white" text-anchor="middle">WC</text>
                    <text x="200" y="550" font-size="20">Decoración</text>
                    <text x="1000" y="350" font-size="20">Sanitario</text>
                </g>

                <g class="puertas">
                    <text x="30" y="650" fill="#78be20" font-size="24" font-weight="bold">⬅</text>
                    <text x="48" y="670" class="texto-puertas">Salida Vehículos</text>
                    <use href="#coche-frente" x="48" y="695" />

                    <text x="120" y="690" fill="#78be20" font-size="24" font-weight="bold">⬆</text>
                    <text x="120" y="710" class="texto-puertas">Entrada Vehículos</text>
                    <use href="#coche-espalda" x="120" y="735" />

                    <text x="240" y="690" fill="#78be20" font-size="24" font-weight="bold">⬆</text>
                    <text x="240" y="710" class="texto-puertas">Recogida pedidos</text>

                    <text x="540" y="690" fill="#78be20" font-size="24" font-weight="bold">⬇</text>
                    <text x="540" y="710" class="texto-puertas">Salida Tienda</text>

                    <text x="760" y="690" fill="#78be20" font-size="24" font-weight="bold">⬆</text>
                    <text x="760" y="710" class="texto-puertas">Entrada Tienda</text>
                </g>

                <polyline id="ruta-inteligente" points="" />
                <circle id="destino-punto" r="8" cx="0" cy="0" style="display:none;" />
                
                <circle cx="760" cy="730" r="6" fill="#78be20" stroke="white" stroke-width="2"/>
                <text x="760" y="760" font-size="12" text-anchor="middle" font-weight="bold">ESTÁS AQUÍ</text>
            </svg>
        </div>

        <div id="interfaz-voz">
            <div id="chat">
                <div class="msg-bot">¡Hola! Soy tu asistente de Leroy Merlin. ¿Qué estás buscando hoy?</div>
            </div>
            
            <div class="controles">
                <button id="btn-voz">
                    <div id="icono-micro">🎤</div>
                    <span id="txt-micro">PULSAR PARA HABLAR</span>
                </button>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="oculto">
        <div id="modal-content">
            <h2 id="modal-producto-nombre">Producto</h2>
            <div class="sugerencias">
                <p>💡 <strong>Tip de experto:</strong> Otros clientes también llevaron:</p>
                <ul id="modal-lista-relacionados"></ul>
            </div>
            <button id="btn-cerrar-modal">¡Entendido, llévame allí!</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
