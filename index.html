        #svg-mapa {

        .bloque-verde { fill: #dce6cd; }

        .bloque-gris { fill: #caced2; }

        .burbuja { fill: #00304b; }

        .texto-puertas { font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 12px; fill: #333; text-anchor: middle; font-weight: bold; }
        
        /* Animación Ruta GPS */
        #ruta-inteligente { 
            fill: none; stroke: #d32f2f; stroke-width: 4; 
            stroke-linecap: round; stroke-linejoin: round; 
            stroke-dasharray: 10 10; opacity: 0.9; 
            animation: marchar 1s linear infinite; 
        }
        @keyframes marchar { to { stroke-dashoffset: -20; } }
        .punto-destino { fill: #d32f2f; stroke: white; stroke-width: 3; }
        .entrada-punto { fill: #78be20; stroke: #00304b; stroke-width: 3; }
    </style>
